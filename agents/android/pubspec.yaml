name: xmrig_android_agent
description: XMRig Android Miner Agent with Background Service
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_background_service: ^5.0.5
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  http: ^1.1.0
  battery_plus: ^5.0.2
  device_info_plus: ^9.0.3
  network_info_plus: ^5.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/xmrig-arm64
